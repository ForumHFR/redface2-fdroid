name: Publish APK to F-Droid repo

# Listens for a `repository_dispatch` event of type `rf2_release` fired by the
# `redface2` release workflow when a new `app-v*` tag has been built. The
# payload carries the tag name + the asset filename so we can download the
# matching APK from `redface2`'s GitHub Release without doing API discovery.
on:
  repository_dispatch:
    types: [rf2_release]
  # Manual trigger to allow a one-shot republish without re-tagging redface2.
  workflow_dispatch:
    inputs:
      tag:
        description: 'redface2 release tag (e.g. app-v52)'
        required: true
      apk_filename:
        description: 'APK asset filename in the release'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # to push to gh-pages
    steps:
      - name: Resolve inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "tag=${{ github.event.client_payload.tag }}" >> "$GITHUB_OUTPUT"
            echo "apk_filename=${{ github.event.client_payload.apk_filename }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "apk_filename=${{ github.event.inputs.apk_filename }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Install fdroidserver from PyPI
        # `apt install fdroidserver` on Ubuntu 24.04 ships 2.2.1 which bundles an
        # old androguard that chokes on APKs built with AGP 9.x
        # (`ResParserError: res1 must be zero!`). PyPI's fdroidserver 2.4.x
        # carries a patched androguard that handles modern resources.arsc.
        run: |
          sudo apt-get update -qq
          # System Java + apksigner are still needed (fdroidserver shells out
          # to jarsigner/apksigner) ; we just upgrade the Python package itself.
          sudo apt-get install -y --no-install-recommends \
            default-jdk-headless apksigner
          # Use a venv to avoid PEP 668 ; symlink fdroid into PATH for convenience.
          python3 -m venv /opt/fdroid-venv
          /opt/fdroid-venv/bin/pip install --quiet --upgrade pip
          /opt/fdroid-venv/bin/pip install --quiet fdroidserver
          sudo ln -s /opt/fdroid-venv/bin/fdroid /usr/local/bin/fdroid
          fdroid --version | head -1

      - name: Restore F-Droid keystore
        env:
          KEYSTORE_B64: ${{ secrets.FDROID_KEYSTORE_B64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > fdroid.keystore
          chmod 600 fdroid.keystore

      - name: Write CI-only config.yml
        env:
          KEY_ALIAS_VALUE: ${{ secrets.FDROID_KEY_ALIAS }}
          KEYSTOREPASS_VALUE: ${{ secrets.FDROID_KEY_PASSWORD }}
        run: |
          # Same rationale as in bootstrap.yml : config.yml carries the
          # signing creds inline (F-Droid upstream convention), it lives only
          # on the ephemeral runner, and the push step is restricted to
          # `repo/` so config.yml never lands in any commit.
          umask 077
          cat > config.yml <<YAML
          repo_url: https://forumhfr.github.io/redface2-fdroid/repo
          repo_name: Redface 2 F-Droid repository
          repo_description: |-
            Dépôt F-Droid pour Redface 2, le client Android moderne de
            forum.hardware.fr. APKs signés avec la clé upload d'origine ;
            mises à jour publiées automatiquement à chaque release upstream.
          archive_older: 5
          archive_url: https://forumhfr.github.io/redface2-fdroid/archive
          archive_name: Redface 2 archive
          archive_description: Anciennes versions de Redface 2.
          keystore: fdroid.keystore
          repo_keyalias: ${KEY_ALIAS_VALUE}
          keystorepass: ${KEYSTOREPASS_VALUE}
          keypass: ${KEYSTOREPASS_VALUE}
          YAML
          chmod 600 config.yml

      - name: Download APK from redface2 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.inputs.outputs.tag }}
          APK: ${{ steps.inputs.outputs.apk_filename }}
        run: |
          mkdir -p repo
          gh release download "$TAG" \
            --repo ForumHFR/redface2 \
            --pattern "$APK" \
            --dir repo/

      - name: Ensure app metadata exists
        # fdroidserver 2.4+ refuses to generate the index if `repo/categories.txt`
        # is zero-size (or if no app declares a category). The metadata file
        # below populates both — it's idempotent and only written once per
        # workflow run (subsequent runs are no-ops if the file already
        # exists). Manual edits to the metadata are preserved on re-runs
        # since we use `[[ -f ]]` gate.
        run: |
          mkdir -p metadata
          if [[ ! -f metadata/fr.forumhfr.redface2.yml ]]; then
            cat > metadata/fr.forumhfr.redface2.yml <<'YAML'
          Categories:
            - Internet
          License: GPL-3.0-only
          AuthorName: ForumHFR
          WebSite: https://github.com/ForumHFR/redface2
          SourceCode: https://github.com/ForumHFR/redface2
          IssueTracker: https://github.com/ForumHFR/redface2/issues
          Changelog: https://github.com/ForumHFR/redface2/blob/main/app/CHANGELOG.md
          Name: Redface 2
          Summary: Client Android moderne du forum hardware.fr
          Description: |-
              Redface 2 est un client Android natif pour forum.hardware.fr,
              écrit en Kotlin avec Jetpack Compose. Lecture des topics,
              écriture (reply, quote, édition), recherche, drapeaux.
              Conçu pour remplacer l'app Redface historique sans dépendance
              Firebase ni Play Services.
          YAML
          fi

      - name: Run fdroid update
        # `set -o pipefail` is critical — without it, a `tail -30` would mask a
        # fdroid update failure (the pipe's exit code defaults to tail's
        # which is always 0). We also drop the tail wrapping for the
        # `--pretty` output and rely on GitHub Actions to truncate the log
        # naturally if it grows too long. Full output is more useful than a
        # silently-failing summary.
        shell: bash
        run: |
          set -euo pipefail
          # `fdroid update` reads config.yml from the working directory.
          # `--delete-unknown` removes APKs no longer referenced by metadata,
          # keeping `repo/` lean even after many releases.
          fdroid update --create-metadata --delete-unknown --pretty

      - name: Clean keystore from runner
        if: always()
        run: |
          # Defensive — the runner is ephemeral but we don't want the keystore
          # surviving a step failure on a re-used runner image.
          shred -uvz fdroid.keystore || rm -f fdroid.keystore

      - name: Commit and push gh-pages
        run: |
          git config user.email "fdroid-bot@users.noreply.github.com"
          git config user.name "redface2-fdroid-publisher"
          git add repo/ stats/ 2>/dev/null || true
          # Avoid an empty commit if fdroid update produced no diff (e.g. the
          # APK was already indexed by a prior run on the same tag).
          if git diff --cached --quiet; then
            echo "No changes to commit — index unchanged."
          else
            git commit -m "fdroid: publish ${{ steps.inputs.outputs.tag }}"
            git push origin gh-pages
          fi
